<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería · Bóveda con oro y plata custodiada</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 50% 0%, #1e293b, #0b1220 60%);
      color: #e2e8f0; min-height: 100vh; padding: 50px 20px;
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-family: 'Poppins'; font-size: clamp(1.8rem, 4vw, 2.6rem); text-align: center; margin-bottom: 8px; }
    h1 span { background: linear-gradient(135deg,#fde68a,#f5c518); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .sub { text-align: center; color: #94a3b8; margin-bottom: 44px; }
    .gallery { display: grid; gap: 30px; }
    figure {
      background: #111a2b; border: 1px solid #1f2c44; border-radius: 18px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.4);
    }
    figure img { width: 100%; display: block; }
    figcaption { padding: 16px 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    figcaption strong { font-family: 'Poppins'; font-size: 1.05rem; }
    figcaption small { color: #94a3b8; }
    .dl { color: #38bdf8; font-weight: 600; text-decoration: none; font-size: .9rem; }
    .dl:hover { text-decoration: underline; }
    @media (min-width: 760px) { .gallery { grid-template-columns: 1fr 1fr; } .full { grid-column: 1 / -1; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bóveda con <span>oro y plata</span> custodiada</h1>
    <p class="sub">Ilustraciones vectoriales (SVG) · escalables sin pérdida de calidad</p>

    <div class="gallery">
      <figure class="full">
        <img src="img/boveda-custodiada.svg" alt="Caja fuerte con oro y plata custodiada por un guardia y cámaras" />
        <figcaption>
          <span><strong>Bóveda custodiada</strong><br><small>Caja fuerte + guardia + cámaras + escudo</small></span>
          <a class="dl" href="img/boveda-custodiada.svg" download>Descargar SVG</a>
        </figcaption>
      </figure>

      <figure>
        <img src="img/boveda-oro-plata.svg" alt="Caja fuerte con lingotes de oro y plata" />
        <figcaption>
          <span><strong>Caja fuerte clásica</strong><br><small>Lingotes de oro y plata</small></span>
          <a class="dl" href="img/boveda-oro-plata.svg" download>Descargar SVG</a>
        </figcaption>
      </figure>

      <figure>
        <img src="img/lingotes-oro-plata.svg" alt="Lingotes de oro y plata apilados" />
        <figcaption>
          <span><strong>Lingotes en primer plano</strong><br><small>Oro 9999 y plata 999</small></span>
          <a class="dl" href="img/lingotes-oro-plata.svg" download>Descargar SVG</a>
        </figcaption>
      </figure>

      <figure class="full">
        <img src="img/banner-boveda-seguridad.svg" alt="Banner de bóveda de seguridad con oro y plata" />
        <figcaption>
          <span><strong>Banner promocional</strong><br><small>Formato ancho 1280×420 para encabezados</small></span>
          <a class="dl" href="img/banner-boveda-seguridad.svg" download>Descargar SVG</a>
        </figcaption>
      </figure>
    </div>
  </div>
</body>
</html>
