<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640" role="img" aria-label="Caja fuerte con oro y plata custodiada por un guardia y cámaras de seguridad">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="spot2" cx="50%" cy="30%" r="70%">
      <stop offset="0" stop-color="#3b4a63" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0b1220" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222e40"/>
      <stop offset="1" stop-color="#10151f"/>
    </linearGradient>
    <linearGradient id="safeBody2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#525c6b"/>
      <stop offset="0.5" stop-color="#3a4250"/>
      <stop offset="1" stop-color="#222a36"/>
    </linearGradient>
    <linearGradient id="safeDoor2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#76808f"/>
      <stop offset="0.5" stop-color="#525c6b"/>
      <stop offset="1" stop-color="#3a4250"/>
    </linearGradient>
    <radialGradient id="dial2" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="0.6" stop-color="#9ca3af"/>
      <stop offset="1" stop-color="#4b5563"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/><stop offset="0.45" stop-color="#f5c518"/><stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldTop2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff3c4"/><stop offset="1" stop-color="#f5c518"/>
    </linearGradient>
    <linearGradient id="goldSide2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0a80d"/><stop offset="1" stop-color="#946a06"/>
    </linearGradient>
    <linearGradient id="silver2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/><stop offset="0.45" stop-color="#cbd5e1"/><stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="silverTop2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="silverSide2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b4bfcc"/><stop offset="1" stop-color="#6b7686"/>
    </linearGradient>
    <radialGradient id="treasureGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f5c518" stop-opacity="0.4"/><stop offset="1" stop-color="#f5c518" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1000" height="640" fill="url(#bg2)"/>
  <rect width="1000" height="640" fill="url(#spot2)"/>
  <rect y="470" width="1000" height="170" fill="url(#floor2)"/>
  <line x1="0" y1="470" x2="1000" y2="470" stroke="#0b1220" stroke-width="2"/>
  <!-- baldosas -->
  <g stroke="#2b384c" stroke-width="1.5" opacity="0.6">
    <line x1="120" y1="470" x2="40" y2="640"/>
    <line x1="350" y1="470" x2="320" y2="640"/>
    <line x1="650" y1="470" x2="680" y2="640"/>
    <line x1="880" y1="470" x2="960" y2="640"/>
  </g>

  <!-- Cámaras de seguridad -->
  <g>
    <!-- izquierda -->
    <g transform="translate(95,70)">
      <rect x="0" y="6" width="14" height="8" fill="#475569"/>
      <rect x="10" y="0" width="48" height="22" rx="6" fill="#64748b" stroke="#334155" stroke-width="2"/>
      <circle cx="54" cy="11" r="6" fill="#1f2937"/><circle cx="54" cy="11" r="2.5" fill="#0ea5e9"/>
      <circle cx="20" cy="6" r="2.5" fill="#ef4444"/>
      <path d="M58 11 L150 60 L150 30 Z" fill="#0ea5e9" opacity="0.12"/>
    </g>
    <!-- derecha -->
    <g transform="translate(905,70) scale(-1,1)">
      <rect x="0" y="6" width="14" height="8" fill="#475569"/>
      <rect x="10" y="0" width="48" height="22" rx="6" fill="#64748b" stroke="#334155" stroke-width="2"/>
      <circle cx="54" cy="11" r="6" fill="#1f2937"/><circle cx="54" cy="11" r="2.5" fill="#0ea5e9"/>
      <circle cx="20" cy="6" r="2.5" fill="#ef4444"/>
      <path d="M58 11 L150 60 L150 30 Z" fill="#0ea5e9" opacity="0.12"/>
    </g>
  </g>

  <!-- Escudo de protección flotante -->
  <g transform="translate(500,60)">
    <path d="M0,-30 L34,-18 L34,12 C34,34 18,48 0,56 C-18,48 -34,34 -34,12 L-34,-18 Z" fill="url(#shield)" opacity="0.95" stroke="#0b1220" stroke-width="2"/>
    <path d="M-14,8 L-3,20 L18,-8" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Resplandor del tesoro -->
  <ellipse cx="500" cy="510" rx="380" ry="80" fill="url(#treasureGlow)"/>

  <!-- ====== CAJA FUERTE ====== -->
  <g>
    <rect x="320" y="150" width="360" height="330" rx="18" fill="url(#safeBody2)" stroke="#0b1220" stroke-width="4"/>
    <rect x="335" y="165" width="330" height="300" rx="12" fill="#222a36" stroke="#10151f" stroke-width="2"/>
    <rect x="350" y="178" width="300" height="274" rx="10" fill="url(#safeDoor2)" stroke="#222a36" stroke-width="3"/>
    <rect x="366" y="194" width="268" height="242" rx="8" fill="none" stroke="#9ca3af" stroke-width="2" opacity="0.5"/>
    <g fill="#9ca3af">
      <circle cx="340" cy="168" r="5"/><circle cx="660" cy="168" r="5"/>
      <circle cx="340" cy="462" r="5"/><circle cx="660" cy="462" r="5"/>
    </g>
    <!-- Dial -->
    <circle cx="500" cy="300" r="56" fill="#3a4250" stroke="#222a36" stroke-width="4"/>
    <circle cx="500" cy="300" r="42" fill="url(#dial2)" stroke="#6b7280" stroke-width="3"/>
    <circle cx="500" cy="300" r="9" fill="#3a4250"/>
    <line x1="500" y1="300" x2="500" y2="266" stroke="#222a36" stroke-width="4" stroke-linecap="round"/>
    <!-- Manija -->
    <rect x="492" y="388" width="16" height="58" rx="8" fill="#6b7280" stroke="#222a36" stroke-width="3"/>
    <rect x="440" y="384" width="120" height="16" rx="8" fill="#6b7280" stroke="#222a36" stroke-width="3"/>
    <circle cx="500" cy="390" r="13" fill="#76808f" stroke="#222a36" stroke-width="3"/>
    <!-- Bisagras -->
    <rect x="642" y="210" width="16" height="40" rx="4" fill="#222a36"/>
    <rect x="642" y="380" width="16" height="40" rx="4" fill="#222a36"/>
  </g>

  <!-- ====== LINGOTES ====== -->
  <ellipse cx="500" cy="520" rx="300" ry="36" fill="#000" opacity="0.35"/>

  <!-- Plata izquierda -->
  <g transform="translate(210,470)">
    <g><polygon points="0,30 110,30 95,55 15,55" fill="url(#silverSide2)"/><polygon points="0,30 15,12 125,12 110,30" fill="url(#silverTop2)"/><polygon points="110,30 125,12 125,37 110,55" fill="url(#silver2)"/></g>
    <g transform="translate(20,-26)"><polygon points="0,30 110,30 95,55 15,55" fill="url(#silverSide2)"/><polygon points="0,30 15,12 125,12 110,30" fill="url(#silverTop2)"/><polygon points="110,30 125,12 125,37 110,55" fill="url(#silver2)"/><text x="55" y="48" font-family="Arial" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">999</text></g>
  </g>

  <!-- Oro centro -->
  <g transform="translate(410,480)">
    <g transform="translate(-40,40)"><polygon points="0,30 120,30 104,58 16,58" fill="url(#goldSide2)"/><polygon points="0,30 16,10 136,10 120,30" fill="url(#goldTop2)"/><polygon points="120,30 136,10 136,38 120,58" fill="url(#gold2)"/></g>
    <g transform="translate(90,40)"><polygon points="0,30 120,30 104,58 16,58" fill="url(#goldSide2)"/><polygon points="0,30 16,10 136,10 120,30" fill="url(#goldTop2)"/><polygon points="120,30 136,10 136,38 120,58" fill="url(#gold2)"/></g>
    <g transform="translate(25,2)"><polygon points="0,30 120,30 104,58 16,58" fill="url(#goldSide2)"/><polygon points="0,30 16,10 136,10 120,30" fill="url(#goldTop2)"/><polygon points="120,30 136,10 136,38 120,58" fill="url(#gold2)"/><text x="68" y="52" font-family="Arial" font-size="13" font-weight="bold" fill="#946a06" text-anchor="middle">9999</text></g>
  </g>

  <!-- Plata derecha -->
  <g transform="translate(672,492)">
    <g><polygon points="0,30 110,30 95,55 15,55" fill="url(#silverSide2)"/><polygon points="0,30 15,12 125,12 110,30" fill="url(#silverTop2)"/><polygon points="110,30 125,12 125,37 110,55" fill="url(#silver2)"/><text x="55" y="48" font-family="Arial" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">999</text></g>
  </g>

  <!-- ====== GUARDIA ====== -->
  <g transform="translate(815,250)">
    <!-- sombra -->
    <ellipse cx="20" cy="262" rx="70" ry="16" fill="#000" opacity="0.35"/>
    <!-- piernas -->
    <rect x="-12" y="170" width="26" height="90" rx="8" fill="#1f2937"/>
    <rect x="22" y="170" width="26" height="90" rx="8" fill="#1f2937"/>
    <rect x="-16" y="252" width="34" height="14" rx="4" fill="#0b1220"/>
    <rect x="20" y="252" width="34" height="14" rx="4" fill="#0b1220"/>
    <!-- cinturón -->
    <rect x="-16" y="160" width="68" height="14" fill="#0b1220"/>
    <rect x="10" y="161" width="14" height="12" fill="#9ca3af"/>
    <!-- torso -->
    <path d="M-22,90 Q18,78 58,90 L52,166 L-16,166 Z" fill="#334155"/>
    <path d="M-22,90 Q18,78 58,90 L54,108 Q18,98 -18,108 Z" fill="#3b4a63"/>
    <!-- placa -->
    <path d="M2,108 l8,3 8,-3 -2,9 q-6,4 -12,0 z" fill="#f5c518"/>
    <!-- brazos -->
    <rect x="-34" y="92" width="20" height="74" rx="10" fill="#3b4a63"/>
    <rect x="52" y="92" width="20" height="74" rx="10" fill="#3b4a63"/>
    <circle cx="-24" cy="168" r="10" fill="#cd9b7a"/>
    <circle cx="62" cy="168" r="10" fill="#cd9b7a"/>
    <!-- cuello + cabeza -->
    <rect x="10" y="64" width="18" height="20" fill="#cd9b7a"/>
    <circle cx="19" cy="50" r="22" fill="#e0b694"/>
    <!-- gorra -->
    <path d="M-6,40 Q19,18 44,40 L44,46 L-6,46 Z" fill="#1f2937"/>
    <rect x="-10" y="44" width="58" height="8" rx="3" fill="#0b1220"/>
    <path d="M14,30 l5,-2 5,2 -1,8 -8,0 z" fill="#f5c518"/>
  </g>

  <!-- Destellos -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M300 492 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    <path d="M520 470 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
    <path d="M735 508 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
  </g>
</svg>
