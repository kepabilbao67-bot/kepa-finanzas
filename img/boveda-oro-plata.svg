<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" role="img" aria-label="Caja fuerte custodiada con lingotes de oro y plata">
  <defs>
    <!-- Fondos -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#334155" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>

    <!-- Caja fuerte -->
    <linearGradient id="safeBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4b5563"/>
      <stop offset="0.5" stop-color="#374151"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="safeDoor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b7280"/>
      <stop offset="0.5" stop-color="#4b5563"/>
      <stop offset="1" stop-color="#374151"/>
    </linearGradient>
    <radialGradient id="dial" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="0.6" stop-color="#9ca3af"/>
      <stop offset="1" stop-color="#4b5563"/>
    </radialGradient>

    <!-- Oro -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.45" stop-color="#f5c518"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff3c4"/>
      <stop offset="1" stop-color="#f5c518"/>
    </linearGradient>
    <linearGradient id="goldSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0a80d"/>
      <stop offset="1" stop-color="#946a06"/>
    </linearGradient>

    <!-- Plata -->
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="0.45" stop-color="#cbd5e1"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="silverTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="silverSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b4bfcc"/>
      <stop offset="1" stop-color="#6b7686"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f5c518" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f5c518" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="900" height="600" fill="url(#bg)"/>
  <rect width="900" height="600" fill="url(#spot)"/>
  <rect y="430" width="900" height="170" fill="url(#floor)"/>
  <line x1="0" y1="430" x2="900" y2="430" stroke="#0b1220" stroke-width="2"/>

  <!-- Resplandor del tesoro -->
  <ellipse cx="450" cy="470" rx="360" ry="90" fill="url(#glow)"/>

  <!-- ====== CAJA FUERTE ====== -->
  <g>
    <!-- Cuerpo -->
    <rect x="270" y="110" width="360" height="330" rx="18" fill="url(#safeBody)" stroke="#0b1220" stroke-width="4"/>
    <rect x="285" y="125" width="330" height="300" rx="12" fill="#1f2937" stroke="#111827" stroke-width="2"/>

    <!-- Puerta -->
    <rect x="300" y="138" width="300" height="274" rx="10" fill="url(#safeDoor)" stroke="#1f2937" stroke-width="3"/>
    <rect x="316" y="154" width="268" height="242" rx="8" fill="none" stroke="#9ca3af" stroke-width="2" opacity="0.5"/>

    <!-- Remaches -->
    <g fill="#9ca3af">
      <circle cx="290" cy="128" r="5"/><circle cx="610" cy="128" r="5"/>
      <circle cx="290" cy="422" r="5"/><circle cx="610" cy="422" r="5"/>
    </g>

    <!-- Dial / combinación -->
    <circle cx="450" cy="262" r="58" fill="#374151" stroke="#1f2937" stroke-width="4"/>
    <circle cx="450" cy="262" r="44" fill="url(#dial)" stroke="#6b7280" stroke-width="3"/>
    <circle cx="450" cy="262" r="10" fill="#374151"/>
    <g stroke="#4b5563" stroke-width="2">
      <line x1="450" y1="222" x2="450" y2="232"/>
      <line x1="450" y1="292" x2="450" y2="302"/>
      <line x1="410" y1="262" x2="420" y2="262"/>
      <line x1="480" y1="262" x2="490" y2="262"/>
    </g>
    <line x1="450" y1="262" x2="450" y2="228" stroke="#1f2937" stroke-width="4" stroke-linecap="round"/>

    <!-- Manija -->
    <g stroke="#1f2937" stroke-width="10" stroke-linecap="round">
      <line x1="450" y1="350" x2="450" y2="350"/>
    </g>
    <circle cx="450" cy="352" r="14" fill="#6b7280" stroke="#1f2937" stroke-width="3"/>
    <rect x="442" y="352" width="16" height="60" rx="8" fill="#6b7280" stroke="#1f2937" stroke-width="3"/>
    <rect x="390" y="346" width="120" height="16" rx="8" fill="#6b7280" stroke="#1f2937" stroke-width="3"/>

    <!-- Bisagras -->
    <rect x="592" y="170" width="16" height="40" rx="4" fill="#1f2937"/>
    <rect x="592" y="340" width="16" height="40" rx="4" fill="#1f2937"/>
  </g>

  <!-- ====== LINGOTES ====== -->
  <!-- Sombra base -->
  <ellipse cx="450" cy="480" rx="300" ry="40" fill="#000" opacity="0.35"/>

  <!-- Plata (izquierda, atrás) -->
  <g transform="translate(150,430)">
    <g transform="translate(0,0)">
      <polygon points="0,30 110,30 95,55 15,55" fill="url(#silverSide)"/>
      <polygon points="0,30 15,12 125,12 110,30" fill="url(#silverTop)"/>
      <polygon points="110,30 125,12 125,37 110,55" fill="url(#silver)"/>
    </g>
    <g transform="translate(20,-26)">
      <polygon points="0,30 110,30 95,55 15,55" fill="url(#silverSide)"/>
      <polygon points="0,30 15,12 125,12 110,30" fill="url(#silverTop)"/>
      <polygon points="110,30 125,12 125,37 110,55" fill="url(#silver)"/>
      <text x="55" y="48" font-family="Arial" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">999</text>
    </g>
  </g>

  <!-- Oro (centro, frente) -->
  <g transform="translate(360,440)">
    <!-- fila base 3 lingotes -->
    <g transform="translate(-40,40)">
      <polygon points="0,30 120,30 104,58 16,58" fill="url(#goldSide)"/>
      <polygon points="0,30 16,10 136,10 120,30" fill="url(#goldTop)"/>
      <polygon points="120,30 136,10 136,38 120,58" fill="url(#gold)"/>
    </g>
    <g transform="translate(90,40)">
      <polygon points="0,30 120,30 104,58 16,58" fill="url(#goldSide)"/>
      <polygon points="0,30 16,10 136,10 120,30" fill="url(#goldTop)"/>
      <polygon points="120,30 136,10 136,38 120,58" fill="url(#gold)"/>
    </g>
    <!-- fila superior -->
    <g transform="translate(25,2)">
      <polygon points="0,30 120,30 104,58 16,58" fill="url(#goldSide)"/>
      <polygon points="0,30 16,10 136,10 120,30" fill="url(#goldTop)"/>
      <polygon points="120,30 136,10 136,38 120,58" fill="url(#gold)"/>
      <text x="68" y="52" font-family="Arial" font-size="13" font-weight="bold" fill="#946a06" text-anchor="middle">9999</text>
    </g>
  </g>

  <!-- Plata (derecha, frente) -->
  <g transform="translate(620,452)">
    <g transform="translate(0,0)">
      <polygon points="0,30 110,30 95,55 15,55" fill="url(#silverSide)"/>
      <polygon points="0,30 15,12 125,12 110,30" fill="url(#silverTop)"/>
      <polygon points="110,30 125,12 125,37 110,55" fill="url(#silver)"/>
      <text x="55" y="48" font-family="Arial" font-size="11" font-weight="bold" fill="#64748b" text-anchor="middle">999</text>
    </g>
  </g>

  <!-- Destellos -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M250 455 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    <path d="M470 432 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
    <path d="M690 470 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
  </g>
</svg>
